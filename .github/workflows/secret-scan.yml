name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          echo "=== Secret Scan ==="
          FOUND=0

          # Azure Storage Account Keys (base64, 88 chars)
          if grep -rn '[A-Za-z0-9+/]\{86,88\}==' --include='*.sh' --include='*.py' --include='*.yaml' --include='*.yml' --include='*.json' --include='*.tf' . 2>/dev/null | grep -iv 'secret-scan\|\.git\|node_modules\|EICAR'; then
            echo "::warning::Possible Azure storage key found"
          fi

          # Azure Subscription IDs
          if grep -rn '[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' --include='*.sh' --include='*.py' --include='*.yaml' --include='*.yml' --include='*.tf' . 2>/dev/null | grep -iv 'secret-scan\|\.git\|node_modules\|example\|placeholder'; then
            echo "::warning::Possible subscription/tenant ID found — verify not real"
          fi

          # AWS credentials
          if grep -rn 'AKIA[0-9A-Z]\{16\}' . 2>/dev/null | grep -iv 'secret-scan\|\.git'; then
            echo "::error::AWS access key found"
            FOUND=1
          fi

          # Private keys
          if grep -rn 'BEGIN.*PRIVATE KEY' . 2>/dev/null | grep -iv 'secret-scan\|\.git'; then
            echo "::error::Private key found"
            FOUND=1
          fi

          # Personal paths
          if grep -rn 'C:\\Users\\' --include='*.sh' --include='*.py' --include='*.yaml' --include='*.yml' . 2>/dev/null | grep -iv 'secret-scan\|\.git\|README\|CLAUDE'; then
            echo "::error::Personal file path found"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Secret scan FAILED"
            exit 1
          fi

          echo "Secret scan passed"
