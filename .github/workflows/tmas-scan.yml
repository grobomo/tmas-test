name: TMAS Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Build the container image
      - name: Build image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest

      # Official TMAS scan with --override for excluding irrelevant findings
      # Uses: https://github.com/trendmicro/tmas-scan-action
      # Override docs: https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-override-vulnerability-findings
      - name: TMAS Scan (official action)
        id: tmas
        uses: trendmicro/tmas-scan-action@v3
        with:
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: docker:${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          additionalArgs: >-
            --override tmas_overrides.yml
            --saveSBOM
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Also run with --evaluatePolicy to check against V1 Code Security policies
      - name: TMAS Policy Evaluation
        id: policy
        continue-on-error: true
        uses: trendmicro/tmas-scan-action@v3
        with:
          vulnerabilitiesScan: true
          malwareScan: true
          secretsScan: true
          artifact: docker:${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          additionalArgs: >-
            --override tmas_overrides.yml
            --evaluatePolicy
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Collect enriched metadata (K8s labels, docker labels, CI context)
      - name: Collect App + K8s Metadata
        if: always()
        run: |
          pip install pyyaml -q
          mkdir -p tmas-results
          python3 << 'PYEOF'
          import json, yaml, glob, os, subprocess

          report = {
              "scan_metadata": {
                  "timestamp": "${{ github.event.head_commit.timestamp }}",
                  "image": {
                      "full": "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}",
                      "name": "${{ env.IMAGE_NAME }}",
                      "tag": "${{ env.IMAGE_TAG }}"
                  }
              },
              "ci_metadata": {
                  "system": "github-actions",
                  "build_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                  "build_id": "${{ github.run_id }}",
                  "run_number": "${{ github.run_number }}",
                  "triggered_by": "${{ github.actor }}",
                  "event": "${{ github.event_name }}",
                  "git": {
                      "sha": "${{ github.sha }}",
                      "branch": "${{ github.ref_name }}",
                      "repo": "${{ github.repository }}"
                  }
              },
              "overrides": {
                  "file": "tmas_overrides.yml",
                  "note": "Official TMAS --override flag. Overridden findings in Overridden section of scan JSON."
              },
              "kubernetes": {
                  "from_manifests": []
              }
          }

          # Collect image metadata from docker inspect
          try:
              inspect = json.loads(subprocess.check_output(
                  ["docker", "inspect", "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"],
                  text=True
              ))
              img = inspect[0] if inspect else {}
              report["scan_metadata"]["image"].update({
                  "digest": (img.get("RepoDigests", [""])[0].split("@")[-1] if img.get("RepoDigests") else ""),
                  "created": img.get("Created", ""),
                  "size_bytes": img.get("Size", 0),
                  "os": img.get("Os", ""),
                  "arch": img.get("Architecture", ""),
                  "docker_labels": img.get("Config", {}).get("Labels", {}),
                  "env_vars": [e.split("=")[0] for e in img.get("Config", {}).get("Env", [])],
                  "exposed_ports": list(img.get("Config", {}).get("ExposedPorts", {}).keys()),
                  "layers": len(img.get("RootFS", {}).get("Layers", []))
              })
          except Exception as e:
              report["scan_metadata"]["image"]["inspect_error"] = str(e)

          # Parse K8s manifests for labels
          for f in glob.glob("k8s/**/*.yaml", recursive=True) + glob.glob("k8s/**/*.yml", recursive=True):
              try:
                  with open(f) as fh:
                      for doc in yaml.safe_load_all(fh):
                          if not doc or not isinstance(doc, dict):
                              continue
                          kind = doc.get("kind", "")
                          if kind in ("Deployment", "StatefulSet", "DaemonSet", "Job", "CronJob", "Pod"):
                              meta = doc.get("metadata", {})
                              tmpl = doc.get("spec", {}).get("template", {})
                              containers = tmpl.get("spec", {}).get("containers", [])
                              report["kubernetes"]["from_manifests"].append({
                                  "source": f,
                                  "kind": kind,
                                  "name": meta.get("name", ""),
                                  "namespace": meta.get("namespace", "default"),
                                  "labels": meta.get("labels", {}),
                                  "pod_labels": tmpl.get("metadata", {}).get("labels", {}),
                                  "annotations": meta.get("annotations", {}),
                                  "pod_annotations": tmpl.get("metadata", {}).get("annotations", {}),
                                  "images": [c.get("image", "") for c in containers],
                                  "container_names": [c.get("name", "") for c in containers],
                                  "resource_limits": {c.get("name"): c.get("resources", {}) for c in containers}
                              })
              except Exception:
                  pass

          with open("tmas-results/enriched-metadata.json", "w") as f:
              json.dump(report, f, indent=2)

          # Print summary
          print("\n=== Enriched Metadata ===")
          print(f"Image: {report['scan_metadata']['image']['full']}")
          labels = report['scan_metadata']['image'].get('docker_labels', {})
          if labels:
              print(f"Docker labels: {json.dumps(labels, indent=2)}")
          k8s = report['kubernetes']['from_manifests']
          if k8s:
              print(f"\nK8s Workloads ({len(k8s)}):")
              for w in k8s:
                  print(f"  {w['kind']}/{w['name']} (ns: {w['namespace']})")
                  print(f"    labels: {json.dumps(w['labels'])}")
                  print(f"    pod_labels: {json.dumps(w['pod_labels'])}")
          PYEOF

      # Upload all artifacts
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmas-scan-results
          path: tmas-results/
          retention-days: 30
