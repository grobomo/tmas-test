# TMAS Scan Exclusions
# Filters out irrelevant detections from container image scans
#
# Common false positives in containers:
# - Kernel packages: containers use HOST kernel, not base image kernel
# - Distro packages never loaded at runtime
# - Disputed/won't-fix CVEs

# Packages to exclude (regex patterns)
exclude_packages:
  - "^linux-libc-dev$"
  - "^linux-headers-.*"
  - "^linux-image-.*"
  - "^linux-kbuild-.*"
  - "^linux-compiler-.*"
  - "^linux-tools-.*"
  - "^linux-source-.*"
  - "^kernel-headers$"
  - "^kernel-devel$"

# Severities to exclude entirely
exclude_severities:
  - "negligible"
  - "unimportant"

# Specific CVEs to exclude (with reason)
exclude_cves:
  # Example: disputed CVEs or accepted risk
  # - cve: "CVE-2024-XXXXX"
  #   reason: "Disputed, not exploitable in this context"

# Packages to exclude only at certain severities
# (keep critical/high, drop medium/low)
downgrade_packages:
  - package: "^openssl$"
    max_severity: "high"    # only alert on high+critical
  - package: "^zlib.*"
    max_severity: "high"
  - package: "^glibc$"
    max_severity: "critical"

# Categories of findings to exclude
exclude_categories:
  - "kernel"        # all kernel-related findings
  - "debug-tools"   # gdb, strace, etc. in base image
